# Palo Alto PAN-OS set format complex fixture
# 测试覆盖: 嵌套地址组(4层)、FQDN、ip-range、禁用规则、服务组、
#           IP 字面量直接引用、带空格的引号名称、端口范围

set address host-a ip-netmask 10.1.1.1/32
set address host-b ip-netmask 10.1.1.2/32
set address subnet-c ip-netmask 172.16.0.0/24
set address range-d ip-range 192.168.1.1-192.168.1.100
set address fqdn-server fqdn www.example.com
set address "tm- 188.172.203.62" ip-netmask 188.172.203.62/32

set address-group inner-grp static [ host-a host-b ]
set address-group mid-grp static [ inner-grp subnet-c ]
set address-group outer-grp static [ mid-grp range-d ]
set address-group deep-grp static [ outer-grp ]

set service svc-https protocol tcp port 443
set service svc-ssh protocol tcp port 22
set service svc-dns-tcp protocol tcp port 53
set service "TCP 8080-8090" protocol tcp port 8080-8090

set service-group web-svcs members [ svc-https svc-ssh ]

# 规则1: 引用 deep-grp（4层嵌套，触发 DEEP_NESTING 警告）
set rulebase security rules permit-deep from [ trust ]
set rulebase security rules permit-deep to [ untrust ]
set rulebase security rules permit-deep source [ deep-grp ]
set rulebase security rules permit-deep destination [ any ]
set rulebase security rules permit-deep service [ svc-https ]
set rulebase security rules permit-deep action allow
set rulebase security rules permit-deep description "Allow deep nested group to HTTPS"

# 规则2: 引用 FQDN 地址
set rulebase security rules permit-fqdn from [ trust ]
set rulebase security rules permit-fqdn to [ untrust ]
set rulebase security rules permit-fqdn source [ any ]
set rulebase security rules permit-fqdn destination [ fqdn-server ]
set rulebase security rules permit-fqdn service [ svc-https ]
set rulebase security rules permit-fqdn action allow

# 规则3: 禁用规则
set rulebase security rules disabled-ssh from [ any ]
set rulebase security rules disabled-ssh to [ any ]
set rulebase security rules disabled-ssh source [ any ]
set rulebase security rules disabled-ssh destination [ any ]
set rulebase security rules disabled-ssh service [ svc-ssh ]
set rulebase security rules disabled-ssh action allow
set rulebase security rules disabled-ssh disabled yes
set rulebase security rules disabled-ssh description "SSH disabled for security"

# 规则4: 引用服务组
set rulebase security rules permit-admin from [ trust ]
set rulebase security rules permit-admin to [ dmz ]
set rulebase security rules permit-admin source [ inner-grp ]
set rulebase security rules permit-admin destination [ subnet-c ]
set rulebase security rules permit-admin service [ web-svcs ]
set rulebase security rules permit-admin action allow

# 规则5: IP 字面量直接作为 source/destination (不在 set address 中定义)
set rulebase security rules permit-inline-ip from [ trust ]
set rulebase security rules permit-inline-ip to [ untrust ]
set rulebase security rules permit-inline-ip source [ 10.99.0.1 10.99.0.0/24 ]
set rulebase security rules permit-inline-ip destination [ 203.0.113.50 ]
set rulebase security rules permit-inline-ip service [ svc-dns-tcp ]
set rulebase security rules permit-inline-ip action allow
set rulebase security rules permit-inline-ip description "Inline IP addresses"

# 规则6: 带空格引号名称的地址 + 端口范围服务
set rulebase security rules "Deny Quoted" from [ untrust ]
set rulebase security rules "Deny Quoted" to [ trust ]
set rulebase security rules "Deny Quoted" source [ any ]
set rulebase security rules "Deny Quoted" destination [ "tm- 188.172.203.62" ]
set rulebase security rules "Deny Quoted" service [ "TCP 8080-8090" ]
set rulebase security rules "Deny Quoted" action deny

# 规则7: deny-all
set rulebase security rules deny-all from [ any ]
set rulebase security rules deny-all to [ any ]
set rulebase security rules deny-all source [ any ]
set rulebase security rules deny-all destination [ any ]
set rulebase security rules deny-all service [ any ]
set rulebase security rules deny-all action deny
