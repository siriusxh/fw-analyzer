! Cisco ASA 复杂配置示例
! 覆盖场景：4层嵌套 object-group、FQDN 对象、端口范围

! --- 地址对象 ---
object network host-a
 host 10.1.1.1

object network host-b
 host 10.1.1.2

object network subnet-c
 subnet 172.16.0.0 255.255.255.0

object network fqdn-server
 fqdn v4 www.example.com

! --- 嵌套地址组：4层 ---
! inner-grp → mid-grp → outer-grp → deep-grp
object-group network inner-grp
 network-object object host-a
 network-object object host-b

object-group network mid-grp
 group-object inner-grp
 network-object object subnet-c

object-group network outer-grp
 group-object mid-grp
 network-object 192.168.0.0 255.255.0.0

object-group network deep-grp
 group-object outer-grp

! --- 服务对象和组 ---
object service svc-https
 service tcp destination eq 443

object service svc-ssh
 service tcp destination eq 22

object-group service web-svcs tcp
 port-object eq 80
 port-object eq 443
 port-object range 8080 8443

object-group service admin-svcs tcp
 group-object web-svcs
 port-object eq 22

! --- ACL 规则 ---
! 规则1：引用 deep-grp（触发 DEEP_NESTING 警告）
access-list OUTSIDE_IN extended permit tcp object-group deep-grp any eq 443

! 规则2：引用 FQDN 对象
access-list OUTSIDE_IN extended permit tcp any object fqdn-server eq 80

! 规则3：引用嵌套服务组
access-list OUTSIDE_IN extended permit tcp object-group inner-grp any object-group admin-svcs

! 规则4：端口范围规则
access-list OUTSIDE_IN extended permit tcp 192.168.1.0 255.255.255.0 any range 3306 3307

! 规则5：deny-all
access-list OUTSIDE_IN extended deny ip any any

interface GigabitEthernet0/0
 nameif outside
 access-group OUTSIDE_IN in interface outside
