config vdom
edit root
config firewall address
    edit "host-a"
        set type ipmask
        set subnet 10.1.1.1 255.255.255.255
    next
    edit "host-b"
        set type ipmask
        set subnet 10.1.1.2 255.255.255.255
    next
    edit "subnet-c"
        set type ipmask
        set subnet 172.16.0.0 255.255.255.0
    next
    edit "net-192"
        set type ipmask
        set subnet 192.168.0.0 255.255.0.0
    next
    edit "fqdn-server"
        set type fqdn
        set fqdn "www.example.com"
    next
    edit "wildcard-fqdn-obj"
        set type wildcard-fqdn
        set wildcard-fqdn "example.org"
    next
    edit "all"
        set type ipmask
        set subnet 0.0.0.0 0.0.0.0
    next
end
config firewall addrgrp
    edit "inner-grp"
        set member "host-a" "host-b"
    next
    edit "mid-grp"
        set member "inner-grp" "subnet-c"
    next
    edit "outer-grp"
        set member "mid-grp" "net-192"
    next
    edit "deep-grp"
        set member "outer-grp"
    next
end
config firewall service custom
    edit "HTTPS"
        set protocol TCP
        set tcp-portrange 443
    next
    edit "SSH"
        set protocol TCP
        set tcp-portrange 22
    next
    edit "DNS"
        set protocol TCP/UDP/SCTP
        set tcp-portrange 53
        set udp-portrange 53
    next
    edit "DB-PORTS"
        set protocol TCP
        set tcp-portrange 3306 5432
    next
end
config firewall service group
    edit "web-svcs"
        set member "HTTPS" "SSH"
    next
end
config firewall policy
    edit 1
        set name "permit-deep"
        set srcintf "lan"
        set dstintf "wan"
        set srcaddr "deep-grp"
        set dstaddr "all"
        set action accept
        set service "HTTPS"
        set status enable
        set comments "Allow deep nested group to HTTPS"
    next
    edit 2
        set name "permit-fqdn"
        set srcintf "any"
        set dstintf "wan"
        set srcaddr "all"
        set dstaddr "fqdn-server"
        set action accept
        set service "HTTPS"
        set status enable
    next
    edit 3
        set name "disabled-ssh"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set service "SSH"
        set status disable
    next
    edit 4
        set name "permit-admin"
        set srcintf "lan"
        set dstintf "dmz"
        set srcaddr "inner-grp"
        set dstaddr "subnet-c"
        set action accept
        set service "web-svcs"
        set status enable
    next
    edit 5
        set name "permit-wildcard-fqdn"
        set srcintf "any"
        set dstintf "wan"
        set srcaddr "all"
        set dstaddr "wildcard-fqdn-obj"
        set action accept
        set service "HTTPS"
        set status enable
    next
    edit 6
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set service "ALL"
        set status enable
    next
end
end
