set address web-server ip-netmask 10.0.0.10/32
set address internal-net ip-netmask 192.168.1.0/24
set address dmz-net ip-netmask 172.16.0.0/24

set address-group internal-grp static [ internal-net dmz-net ]

set service svc-https protocol tcp port 443
set service svc-telnet protocol tcp port 23

set rulebase security rules permit-https from [ trust ]
set rulebase security rules permit-https to [ untrust ]
set rulebase security rules permit-https source [ internal-grp ]
set rulebase security rules permit-https destination [ any ]
set rulebase security rules permit-https service [ svc-https ]
set rulebase security rules permit-https action allow

set rulebase security rules permit-telnet from [ any ]
set rulebase security rules permit-telnet to [ any ]
set rulebase security rules permit-telnet source [ any ]
set rulebase security rules permit-telnet destination [ any ]
set rulebase security rules permit-telnet service [ svc-telnet ]
set rulebase security rules permit-telnet action allow

set rulebase security rules deny-all from [ any ]
set rulebase security rules deny-all to [ any ]
set rulebase security rules deny-all source [ any ]
set rulebase security rules deny-all destination [ any ]
set rulebase security rules deny-all service [ any ]
set rulebase security rules deny-all action deny
