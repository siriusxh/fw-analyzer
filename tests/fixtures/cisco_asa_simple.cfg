! Cisco ASA 配置示例
! 用于测试对象/对象组展开和 ACL 解析

object network web-server
 host 10.0.0.10

object network db-server
 host 10.0.0.20

object-group network internal-nets
 network-object 192.168.0.0 255.255.0.0
 network-object 10.0.0.0 255.255.0.0

object service https-svc
 service tcp destination eq 443

object service telnet-svc
 service tcp destination eq 23

access-list OUTSIDE_IN extended permit tcp object-group internal-nets any eq 443
access-list OUTSIDE_IN extended permit tcp object-group internal-nets object web-server eq 80
access-list OUTSIDE_IN extended permit tcp any any eq 23
access-list OUTSIDE_IN extended deny ip any any

interface GigabitEthernet0/0
 nameif outside
 access-group OUTSIDE_IN in interface outside
