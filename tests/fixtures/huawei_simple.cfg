# tests/fixtures/huawei_simple.cfg
# 华为 USG 安全策略示例（新版 security-policy 格式）

security-policy
 rule name permit-web
  source-zone trust
  destination-zone untrust
  source-address 192.168.1.0 mask 255.255.255.0
  destination-address any
  service http
  service https
  action permit
 rule name permit-dns
  source-zone trust
  destination-zone untrust
  source-address 192.168.1.0 mask 255.255.255.0
  destination-address 8.8.8.8 mask 255.255.255.255
  service dns
  action permit
 rule name permit-telnet
  source-zone trust
  destination-zone untrust
  source-address any
  destination-address any
  service telnet
  action permit
 rule name deny-all
  source-zone any
  destination-zone any
  action deny
