# tests/fixtures/huawei_complex.cfg
# 华为 USG 复杂配置示例：嵌套地址组、非连续 wildcard mask、禁用规则、多格式混合

# --- 地址组定义（新版 ip address-group 格式）---
ip address-group inner-grp
  address 10.1.1.1 mask 255.255.255.255
  address 10.1.1.2 mask 255.255.255.255

ip address-group servers-grp
  address 172.16.0.10 mask 255.255.255.255
  address 172.16.0.20 mask 255.255.255.255
  address 172.16.0.30 mask 255.255.255.255

# --- 服务集定义（新版 ip service-set 格式）---
ip service-set web-services type object
 service 0 protocol tcp destination-port 80 to 443

ip service-set db-services type object
 service 0 protocol tcp destination-port 3306 to 3306
 service 1 protocol tcp destination-port 5432 to 5432

# --- 新版安全策略 ---
security-policy
 rule name permit-web
  source-zone trust
  destination-zone untrust
  source-address address-group inner-grp
  destination-address any
  service service-set web-services
  action permit
  description "Allow web access from inner group"
 rule name permit-db
  source-zone trust
  destination-zone dmz
  source-address address-group inner-grp
  destination-address address-group servers-grp
  service service-set db-services
  action permit
 rule name disabled-rule
  source-zone trust
  destination-zone untrust
  source-address any
  destination-address any
  service ssh
  action permit
  undo rule enable
 rule name permit-all-telnet
  source-zone any
  destination-zone any
  source-address any
  destination-address any
  service telnet
  action permit
 rule name deny-all
  source-zone any
  destination-zone any
  action deny

# --- 旧版 ACL 格式（使用 wildcard mask）---
acl number 3001
 rule 0 permit tcp source 192.168.1.0 0.0.0.255 destination any destination-port eq 80
 rule 1 permit tcp source 10.0.0.0 0.0.255.0 destination any destination-port eq 443
 rule 2 deny ip source any destination any
