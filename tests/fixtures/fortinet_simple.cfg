config vdom
edit root
config firewall address
    edit "internal-net"
        set subnet 192.168.1.0 255.255.255.0
    next
    edit "web-server"
        set type ipmask
        set subnet 10.0.0.10 255.255.255.255
    next
    edit "all"
        set type ipmask
        set subnet 0.0.0.0 0.0.0.0
    next
end
config firewall addrgrp
    edit "internal-grp"
        set member "internal-net" "web-server"
    next
end
config firewall service custom
    edit "HTTPS"
        set protocol TCP
        set tcp-portrange 443
    next
    edit "TELNET"
        set protocol TCP
        set tcp-portrange 23
    next
end
config firewall policy
    edit 1
        set name "permit-https"
        set srcintf "lan"
        set dstintf "wan"
        set srcaddr "internal-grp"
        set dstaddr "all"
        set action accept
        set service "HTTPS"
        set status enable
        set comments "Allow HTTPS outbound"
    next
    edit 2
        set name "permit-telnet"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set service "TELNET"
        set status enable
    next
    edit 3
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set service "ALL"
        set status enable
    next
end
end
